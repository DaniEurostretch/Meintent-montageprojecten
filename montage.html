:root{ color-scheme:light; --gold:#cb9751;--gold-d:#b58443;--slate:#395159;--slate-l:#4b6773;--cream:#f5f1e7;--cream-soft:#f6efe6;--mut:#5a6770;--line:#e3dccd;--green:#2f7d4f;--lgreen:#7a9b3c;--red:#b5483b;--ink:#2a3338;}
*{box-sizing:border-box}
body{margin:0;font-family:'MyriadPro','Helvetica Neue',Arial,sans-serif;background:var(--cream);color:var(--ink);font-size:14px}
.wrap{max-width:1240px;margin:0 auto;padding:0 18px 60px}
.bar{background:var(--slate);margin:0 -18px;padding:16px 26px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold)}
.brand{display:flex;align-items:center;gap:16px}.brand img{height:52px;display:block}
.tagline{color:var(--gold);font-size:11px;letter-spacing:3px;text-transform:uppercase;border-left:1px solid #56707a;padding-left:16px;font-weight:600}
.bar .right{color:#cdd6d9;font-size:11px;text-align:right;letter-spacing:2px;text-transform:uppercase}
h1{font-size:22px;color:var(--slate);margin:24px 0 2px;font-weight:700}.sub{color:var(--mut);font-size:13px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:18px 0 6px}
.stat{background:var(--cream-soft);border:1px solid var(--line);border-radius:10px;padding:14px 16px;border-top:3px solid var(--gold)}
.stat .n{font-size:30px;font-weight:700;color:var(--gold);line-height:1}.stat .l{font-size:11px;color:var(--mut);margin-top:6px;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:18px 0}
.chip{border:1px solid var(--line);background:var(--cream-soft);color:var(--slate);padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.chip:hover{border-color:var(--gold)}.chip.active{background:var(--slate);color:#fff;border-color:var(--slate)}.rolebar{display:flex;align-items:center;gap:8px;margin:16px 0 0;font-size:13px;color:var(--mut);font-weight:700}.rolebtn{border:1px solid var(--line);background:var(--cream-soft);color:var(--slate);padding:7px 15px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700}.rolebtn.active{background:var(--gold);color:#fff;border-color:var(--gold)}
#q{flex:1;min-width:200px;padding:9px 13px;border:1px solid var(--line);border-radius:6px;font-size:14px;background:#fff;font-family:inherit}
.count{color:var(--mut);font-size:13px;margin:4px 2px 10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
.card{background:var(--cream-soft);border:1px solid var(--line);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:10px;box-shadow:0 1px 3px rgba(57,81,89,.05);border-left:5px solid var(--line)}
.card.lopend{border-left-color:var(--lgreen)}.card.voltooid{border-left-color:var(--green)}.card.open{border-left-color:var(--red)}
.card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.klant{font-weight:700;font-size:16px;color:var(--slate);line-height:1.25}.order{font-size:15px;color:var(--slate);font-weight:700;font-family:ui-monospace,monospace;margin-top:3px;letter-spacing:.3px}
.badges{display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex-shrink:0}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;white-space:nowrap}
.b-date{background:#efe6d4;color:#8a6526}.b-datered{background:#f8dcd8;color:#b5483b}.b-opgeleverd{background:#dbe8df;color:#235e3e}.b-soon{background:#f6e4c4;color:#8a5a14}.b-past{background:#e7e3da;color:#6f6a5e}.b-none{background:#e7e3da;color:#8f8a7e}
.badges .b-date,.badges .b-soon,.badges .b-past,.badges .b-none{font-size:14px;padding:5px 11px}
.b-lopend{background:#e9efd7;color:#52701f}.b-voltooid{background:#dbe8df;color:#235e3e}.b-open{background:#f3dcd7;color:#8a2f24}
.afm{font-size:13.5px;font-weight:600;color:var(--slate);background:#fff;border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:6px;padding:8px 11px}
.kv{display:grid;grid-template-columns:108px 1fr;gap:5px 10px;font-size:13px;background:#fff;border:1px solid var(--line);border-radius:6px;padding:10px 11px}
.kv .k{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.3px;font-weight:700;padding-top:1px}
.kv .v{font-weight:600;color:var(--ink);word-break:break-word}
.kv a{color:var(--gold-d);text-decoration:none;font-weight:600}.kv a:hover{text-decoration:underline}
.empty{color:#b9b0a0;font-weight:400;font-style:italic}
.fin{background:#fff;border:1px solid var(--line);border-radius:6px;padding:12px 13px}
.fin .row{display:flex;align-items:baseline;gap:8px}.fin .lbl{color:var(--mut);text-transform:uppercase;letter-spacing:.4px;font-weight:700;font-size:13px}
.fin .amt{font-weight:700;color:var(--gold);font-size:27px;margin-left:auto;line-height:1}.fin .brk{font-size:15px;color:var(--slate);margin-top:6px;font-weight:600}
.note{font-size:12.5px;color:var(--slate);background:#fbf7ee;border:1px dashed var(--line);border-radius:6px;padding:8px 10px;line-height:1.4}
.note b{color:var(--gold-d);text-transform:uppercase;font-size:10px;letter-spacing:.5px;display:block;margin-bottom:3px}
.eigen label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);font-weight:700;display:block;margin-bottom:3px}
.eigen textarea{width:100%;border:1px solid var(--line);border-radius:6px;padding:7px;font-size:13px;font-family:inherit;resize:vertical;background:#fff}.note-item{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;background:#fff;border:1px solid var(--line);border-radius:6px;padding:6px 8px;font-size:13px;margin-bottom:4px}.note-del{border:none;background:none;color:var(--red);cursor:pointer;font-size:16px;line-height:1;padding:0 2px}.note-add{display:flex;gap:6px;margin-top:4px}.note-in{flex:1;border:1px solid var(--line);border-radius:6px;padding:7px;font-size:13px;font-family:inherit;background:#fff}.note-btn{border:1px solid var(--gold);background:var(--gold);color:#fff;border-radius:6px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.links{display:flex;flex-wrap:wrap;gap:8px}
.lnk{flex:1;min-width:104px;text-align:center;border:1px solid var(--line);background:#fff;color:var(--slate);border-radius:6px;padding:8px 6px;font-size:12px;font-weight:700;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px}
.lnk:hover{border-color:var(--gold);color:var(--gold-d)}
.lnk.disabled{opacity:.4;pointer-events:none;background:#f3efe6}
footer{margin-top:30px;color:var(--mut);font-size:12px;text-align:center}
@media(max-width:560px){.grid{grid-template-columns:1fr}.tagline{display:none}}
#gate{position:fixed;inset:0;background:#395159;z-index:9999;display:flex;align-items:center;justify-content:center;font-family:'MyriadPro','Helvetica Neue',Arial,sans-serif}#gate .box{background:#f5f1e7;border-top:4px solid #cb9751;border-radius:12px;padding:30px 28px;width:330px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.3)}#gate h2{margin:0 0 4px;color:#395159;font-size:18px}#gate p{margin:0 0 16px;color:#5a6770;font-size:13px}#gate input{width:100%;padding:10px 12px;border:1px solid #e3dccd;border-radius:6px;font-size:15px;margin-bottom:10px;font-family:inherit}#gate button{width:100%;padding:10px;background:#395159;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer}#gate .err{color:#b5483b;font-size:12px;min-height:16px;margin-top:8px}#gate a{display:block;margin-top:12px;color:#5a6770;font-size:12px}body.locked{overflow:hidden}</style></head>
